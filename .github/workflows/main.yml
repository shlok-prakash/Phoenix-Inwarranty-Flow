name : Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: '30 02 * * *' # 8 AM IST Every Day
    - cron: '00 14 * * *'  # 7:30 PM IST Every Day
    - cron: '00 06 * * 1-5'

jobs:
 run-postman-tests:
   runs-on: postman_runner   #Use the same runner in the tag name and uncomment it while using AWS EC2.
   # runs-on: ubuntu-22.04

   
   steps:
   
     - name: Checkout the Code   
       uses: actions/checkout@v6.0.2

     - name: Install Nodejs and npm
       uses: actions/setup-node@v6.3.0
       with:
         node-version: '22' 
         
     - name: Install Newman and html-extra Globally
       run: |  
            npm install -g newman
            npm install -g newman-reporter-htmlextra

     - name: Run the Postman Collection with Newman
       run: |
            newman run 'Inwarranty-flow Collection.postman_collection.json' \
            -e QA.postman_environment.json \
            -d testData.csv \
            -r cli,htmlextra \
            --reporter-htmlextra-export ./newman/index.html
        
     - name: Newman Report
       if: always() #ensures that the archieve executed irrespective whether the previous step has failed or not!!!
       uses: actions/upload-artifact@v5.0.0
       with:
         name: Newman Report
         path: newman/*.html

     - name: Creating - Github Page Branch
       if: always()
       uses: peaceiris/actions-gh-pages@v4.0.0
       with: 
         github_token: ${{ secrets.GITHUB_TOKEN }}
         publish_dir: newman/

     - name: Send Email
       if: always()
       uses: dawidd6/action-send-mail@v16
       with:
         server_address: smtp.gmail.com
         server_port: 465
         # server_port: 587
         secure: true
         username: ${{ secrets.EMAIL_USERNAME }}
         password: ${{ secrets.EMAIL_PASSWORD }}
         subject: Phoenix Inwarranty Flow Test Execution
         to: shlokprakash55@gmail.com
         from: ${{ secrets.EMAIL_USERNAME }}
         body: |
               Hi,
               Phoenix Inwarranty flow tests has been executed. The Report has been published and the URL 
               is: https://shlok-prakash.github.io/Phoenix-Inwarranty-Flow/

         # attachments: newman/index.html
         
         
         





       
     
       
