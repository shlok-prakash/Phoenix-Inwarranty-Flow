name : Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: '30 02 * * *' # 8 AM IST Every Day
    - cron: '00 14 * * *'  # 7:30 PM IST Every Day
    - cron: '00 06 * * 1-5'

jobs:
 run-postman-tests:
   runs-on: ubuntu-latest

   
   steps:
   
     - name: Checkout the Code   
       uses: actions/checkout@v6.0.2

     - name: Install Nodejs and npm
       uses: actions/setup-node@v6.3.0
       with:
         node-version: '22' 
         
     - name: Install Newman and html-extra Globally
       run: |  
            npm install -g newman
            npm install -g newman-reporter-htmlextra

     - name: Run the Postman Collection with Newman
       run: |
            newman run 'Inwarranty-flow Collection.postman_collection.json' \
            -e QA.postman_environment.json \
            -d testData.csv \
            -r cli,htmlextra
        
     - name: Newman Report
       if: always() #ensures that the archieve executed irrespective whether the previous step has failed or not!!!
       uses: actions/upload-artifact@v5.0.0
       with:
         name: Newman Report
         path: newman/*.html

     - name: Creating - Github Page Branch
       if: always()
       uses: peaceiris/actions-gh-pages@v4.0.0
       with: 
         github_token: ${{ secrets.GITHUB_TOKEN }}
         publish_dir: newman/
       
